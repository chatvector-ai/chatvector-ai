version: "3.9"

services:
  db:
    restart: always
    volumes: [] # no live reload in prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

  api:
    restart: always
    volumes: [] # no live code mount in prod
    environment:
      DATABASE_URL: ${DATABASE_URL}
      APP_ENV: production
      GEN_AI_KEY: ${GEN_AI_KEY}
      LOG_FORMAT: JSON
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      CORS_ORIGINS: ${CORS_ORIGINS}
      PYTHONPATH: /app
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "2"]
    deploy:
      resources:
        limits:
          memory: 1g
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
